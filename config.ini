# InsurGuard Configuration File

[System]
# GPU acceleration (set to True if NVIDIA GPU available)
use_gpu = False
data_path = ./data/medical_insurance.csv
output_directory = ./results
log_level = INFO

[DataProcessing]
# Feature scaling
scale_features = True
scaling_method = StandardScaler

# One-hot encoding
encode_categorical = True
categorical_features = sex,smoker,region

# Train-test split
test_size = 0.2
random_state = 42

[DeepLearning]
# MLP Architecture
hidden_layers = [128, 64, 32]
activation_function = relu
dropout_rate = 0.3

# Training
optimizer = adam
learning_rate = 0.001
loss_function = mse
batch_size = 32
epochs = 100
early_stopping_patience = 15

# Validation
validation_split = 0.2

[ReinforcementLearning]
# Q-Learning parameters
learning_rate = 0.1
discount_factor = 0.95
initial_epsilon = 1.0
epsilon_decay = 0.995
epsilon_min = 0.01

# State discretization
bmi_bins = 10
age_bins = 10
smoking_states = 2

# Training
training_episodes = 20
episode_samples = 100

[Security]
# RSA Encryption
rsa_key_size = 2048
padding_algorithm = OAEP
hash_algorithm = SHA256

# SHA-512 Hashing
hash_function = SHA512

# Protected columns
encrypt_columns = User_ID,Personal_Health_Info
hash_columns = Claim_Records

[Analytics]
# Visualization
figure_style = whitegrid
color_palette = husl
dpi = 300

# Plots to generate
generate_risk_distribution = True
generate_correlation_matrix = True
generate_demographic_breakdown = True
generate_regional_analysis = True
generate_prediction_performance = True

[Reporting]
# Output formats
save_metrics_json = True
save_adjustments_json = True
save_visualizations_png = True
generate_html_report = False

# Report details
include_xai_breakdown = True
include_rl_summary = True
include_security_audit = True
