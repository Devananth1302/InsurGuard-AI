<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - InsurGuard AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at top, #1a1f3a, #0a0e27);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* Glass Card */
.login-card {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.logo {
    font-size: 3rem;
    text-align: center;
    margin-bottom: 10px;
    color: #00ff88;
}

.login-title {
    text-align: center;
    font-weight: 800;
    font-size: 1.8rem;
}

.login-subtitle {
    text-align: center;
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 30px;
}

/* Input */
.form-control {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
}

.form-control:focus {
    border-color: #00ff88;
    box-shadow: 0 0 10px rgba(0,255,136,0.3);
}

/* Button */
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #00ff88, #64c8ff);
    border: none;
    padding: 12px;
    font-weight: 700;
    border-radius: 10px;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
}

/* Loader */
.spinner {
    display: none;
    margin-left: 8px;
}

/* Role */
.role-selector {
    display: flex;
    gap: 10px;
    margin: 15px 0;
}

.role-option input {
    display: none;
}

.role-label {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
}

.role-option input:checked + .role-label {
    background: rgba(0,255,136,0.2);
    border-color: #00ff88;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.85rem;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <i class="fas fa-shield-alt"></i>
    </div>

    <div class="login-title">InsurGuard AI</div>
    <div class="login-subtitle">Secure AI Risk Assessment Platform</div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" id="loginForm">

        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <div class="role-selector">
            <div class="role-option">
                <input type="radio" name="role" value="user" checked id="user">
                <label for="user" class="role-label">User</label>
            </div>
            <div class="role-option">
                <input type="radio" name="role" value="admin" id="admin">
                <label for="admin" class="role-label">Admin</label>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">
            Login
            <span class="spinner spinner-border spinner-border-sm"></span>
        </button>

    </form>

    <div class="mt-4 small text-center">
        <b>Demo:</b> user / user123 <br>
        <b>Admin:</b> admin / admin123
    </div>

    <div class="footer">
        🔒 RSA-2048 Encryption | AI Powered
    </div>

</div>

<script>
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");
const spinner = document.querySelector(".spinner");

form.addEventListener("submit", () => {
    btn.disabled = true;
    spinner.style.display = "inline-block";
});
</script>

</body>
</html>
